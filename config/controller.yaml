/**:
  ros__parameters:
    control_rate: 50.0
    odometry_topic: /mimosa_node/graph/odometry
    publish_wrench: true
    publish_cmd_vel: false

    # Safety: if no odometry arrives within this window, all modes force OFF,
    # integrators reset, and output holds at zero until a fresh cmd_vel_in
    # arrives. Set to 0 to disable. At mimosa's ~100 Hz nominal odom rate,
    # 0.5 s = ~50 missed samples.
    odom_timeout: 0.5

    # PID gains — tune per axis.
    # Linear axes (surge/sway/heave) cascade: outer (pose -> velocity setpoint)
    #   feeds inner (velocity -> force).
    # Angular axes (roll/pitch/yaw) run single-loop: outer (pose -> torque)
    #   only. No inner loop because mimosa odometry has no angular velocity;
    #   Kd acts as angular-velocity damping via derivative-on-measurement.
    gains:
      surge:
        outer: {kp: 10.0, ki: 0.0, kd: 1.0, i_max: 0.0}
        inner: {kp: 15.0, ki: 0.0, kd: 1.0, i_max: 20.0}
      sway:
        outer: {kp: 10.0, ki: 0.0, kd: 2.2, i_max: 0.0}
        inner: {kp: 10.0, ki: 0.0, kd: 2.2, i_max: 20.0}
      heave:
        outer: {kp: 10.0, ki: 0.0, kd: 0.5, i_max: 0.0}
        inner: {kp: 20.0, ki: 0.0, kd: 0.5, i_max: 25.0}
      roll:
        outer: {kp: 0.01, ki: 0.0, kd: 0.0, i_max: 1.0}
      pitch:
        outer: {kp: 0.01, ki: 0.0, kd: 0.0, i_max: 1.0}
      yaw:
        outer: {kp: 0.01, ki: 0.0, kd: 0.5, i_max: 1.0}

    # max_velocity [m/s or rad/s] — linear: outer-loop velocity clamp; also the
    #                               joystick full-scale for OFF passthrough on
    #                               all axes.
    # max_effort   [N or Nm] — hard saturation on the axis's final output.
    # max_effort_norm — full-scale effort that maps to ±1 in the Twist output
    #                   (used only when publish_cmd_vel is true).
    limits:
      surge: {max_velocity: 1.0, max_effort: 40.0,  max_effort_norm: 40.0}
      sway:  {max_velocity: 1.0, max_effort: 40.0,  max_effort_norm: 40.0}
      heave: {max_velocity: 1.0, max_effort: 80.0,  max_effort_norm: 80.0}
      roll:  {max_velocity: 1.0, max_effort: 2.0,  max_effort_norm: 2.0}
      pitch: {max_velocity: 1.0, max_effort: 2.0,  max_effort_norm: 2.0}
      yaw:   {max_velocity: 1.0, max_effort: 1.5,  max_effort_norm: 1.5}

    # Startup mode per axis: 0=OFF, 1=INNER_ONLY, 2=FULL.
    mode:
      surge: {default: 0}
      sway:  {default: 0}
      heave: {default: 0}
      roll:  {default: 0}
      pitch: {default: 0}
      yaw:   {default: 0}

    # Fossen (7.87–7.91) reference model. When enabled, each axis' raw pose
    # setpoint is passed through a first-order filter (τ) feeding a
    # second-order mass-spring-damper (ω natural frequency, ζ damping) before
    # the outer PID sees it. ζ = 1.0 is critical damping (no overshoot); ω
    # sets how fast the vehicle is commanded to slew. τ smooths sharp
    # operator-issued setpoint steps.
    reference_model:
      enabled: true
      surge: {omega: 1.0, zeta: 1.0, tau: 0.5}
      sway:  {omega: 1.0, zeta: 1.0, tau: 0.5}
      heave: {omega: 1.0, zeta: 1.0, tau: 0.5}
      roll:  {omega: 1.0, zeta: 1.0, tau: 0.5}
      pitch: {omega: 1.0, zeta: 1.0, tau: 0.5}
      yaw:   {omega: 1.0, zeta: 1.0, tau: 0.5}